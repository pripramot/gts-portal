<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicorn · อัจฉริยะ · ซื่อสัตย์ · นวัตกรรม</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #7c3aed;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #7c3aed, transparent);
            margin: 20px 0;
        }

        #loginForm, #dashboard {
            display: none;
        }

        #loginForm.active, #dashboard.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .dashboard-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .dashboard-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .dashboard-card h3 {
            color: #7c3aed;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .dashboard-card p {
            color: #666;
            font-size: 14px;
        }

        .icon {
            margin-right: 10px;
            font-size: 24px;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #7c3aed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .user-info {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .user-info h4 {
            color: #333;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #666;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo">
            <h1>🦄 Unicorn</h1>
            <p>อัจฉริยะ · ซื่อสัตย์ · นวัตกรรม</p>
        </div>

        <div class="divider"></div>

        <!-- Login Form -->
        <div id="loginForm" class="active">
            <h2 style="margin-bottom: 20px; color: #333;">ยืนยันตัวตน</h2>

            <div class="form-group">
                <label>ชื่อ-นามสกุล</label>
                <input type="text" id="nameInput" placeholder="เช่น นาย สมชาย ใจดี">
            </div>

            <div class="form-group">
                <label>หน่วยงาน</label>
                <input type="text" id="unitInput" placeholder="เช่น สน.บช.น. ป.ป.ส.ภ.5">
            </div>

            <div class="form-group">
                <label>เลขที่หนังสือ/คำสั่ง</label>
                <input type="text" id="docInput" placeholder="เช่น ที่ 123/2569">
            </div>

            <button class="btn" onclick="verifyUser()">
                ยืนยันตัวตน
            </button>
        </div>

        <!-- Dashboard -->
        <div id="dashboard">
            <div class="user-info" id="userInfo"></div>

            <h2 style="margin-bottom: 20px; color: #333;">เมนูหลัก</h2>

            <div class="dashboard-card" onclick="openRemoteACESO()">
                <h3><span class="icon">🖥️</span> Remote ACESO</h3>
                <p>เข้าใช้งาน ACESO ผ่าน Remote Desktop</p>
            </div>

            <div class="dashboard-card" onclick="openLocationTracker()">
                <h3><span class="icon">📍</span> Location Tracker</h3>
                <p>ติดตามตำแหน่งจากเบอร์โทรศัพท์</p>
            </div>

            <div class="dashboard-card" onclick="openReports()">
                <h3><span class="icon">📄</span> รายงานคดี</h3>
                <p>ดูรายงานการวิเคราะห์</p>
            </div>

            <div class="dashboard-card" onclick="openCaseManagement()">
                <h3><span class="icon">📋</span> จัดการคดี</h3>
                <p>สร้างและจัดการข้อมูลคดี</p>
            </div>

            <button class="btn" style="margin-top: 20px; background: #dc3545;" onclick="logout()">
                ออกจากระบบ
            </button>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">กำลังยืนยันตัวตน...</p>
        </div>
    </div>

    <!-- Firebase SDK - Shared Service -->
    <script type="module">
        import {
            initFirebase,
            logAccess,
            getDb
        } from './src/shared/firebase-service.js';

        // Initialize Firebase
        initFirebase();

        // Make functions global for non-module scripts
        window.logAccess = logAccess;
        window.getDb = getDb;
    </script>

    <script>
        let userData = {};

        async function verifyUser() {
            const name = document.getElementById('nameInput').value.trim();
            const unit = document.getElementById('unitInput').value.trim();
            const doc = document.getElementById('docInput').value.trim();

            if (!name || !unit || !doc) {
                alert('กรุณากรอกข้อมูลให้ครบทุกช่อง');
                return;
            }

            // Show loading
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('loading').style.display = 'block';

            // Save to Firebase using shared service
            try {
                await window.logAccess({
                    name: name,
                    unit: unit,
                    document: doc
                });
            } catch (error) {
                console.error("❌ Error saving log:", error);
            }

            // Store user data
            userData = { name, unit, document: doc };
            localStorage.setItem('userData', JSON.stringify(userData));

            // Show dashboard
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                showDashboard();
            }, 2000);
        }

        function showDashboard() {
            document.getElementById('dashboard').classList.add('active');

            const userInfo = document.getElementById('userInfo');
            userInfo.innerHTML = `
                <h4>👤 ${userData.name}</h4>
                <p>หน่วยงาน: ${userData.unit}</p>
                <p>เลขที่: ${userData.document}</p>
                <p>เวลา: ${new Date().toLocaleString('th-TH')}</p>
            `;
        }

        function openRemoteACESO() {
            alert('🖥️ Remote ACESO\n\nกำลังเชื่อมต่อ Remote Desktop...\n\n(ฟีเจอร์นี้จะพร้อมใช้งานหลังติดตั้ง Guacamole)');
        }

        function openLocationTracker() {
            window.location.href = 'location-tracker.html';
        }

        function openReports() {
            alert('📄 รายงานคดี\n\nแสดงรายงานการวิเคราะห์ทั้งหมด\n\n(ฟีเจอร์กำลังพัฒนา)');
        }

        function openCaseManagement() {
            alert('📋 จัดการคดี\n\nสร้างและจัดการข้อมูลคดี\n\n(ฟีเจอร์กำลังพัฒนา)');
        }

        function logout() {
            localStorage.removeItem('userData');
            location.reload();
        }

        // Check if already logged in
        window.onload = function() {
            const stored = localStorage.getItem('userData');
            if (stored) {
                userData = JSON.parse(stored);
                document.getElementById('loginForm').classList.remove('active');
                showDashboard();
            }
        };
    </script>
</body>
</html>
